name: FANZA 同人/動画 → WordPress 自動投稿（3時間おき・AV/同人 各10件・date順）

on:
  schedule:
    # 3時間おき（UTC 0,3,6,9,12,15,18,21時 = 日本時間 9,12,15,18,21,0,3,6時）に実行。1日8回。
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      content_type:
        description: 'コンテンツ種別（手動実行時のみ選択可。定期実行では両方とも投稿します）'
        required: false
        default: 'both'
        type: choice
        options:
          - both    # AV・同人の両方（定期実行と同じ）
          - doujin  # FANZA同人のみ
          - av      # FANZA動画（AV）のみ
      dmm_sort_mode:
        description: 'ソートモード'
        required: false
        default: 'date'
        type: choice
        options:
          - rank   # 人気順
          - date   # 新着順
      price_min:
        description: '価格下限（円・空欄で制限なし）'
        required: false
        default: ''
        type: string
      price_max:
        description: '価格上限（円・空欄で制限なし）'
        required: false
        default: ''
        type: string
      max_articles:
        description: '1回の実行で投稿する記事数の上限（種別ごと）'
        required: false
        default: '10'
        type: string
      wp_post_status:
        description: '投稿ステータス（publishは目視確認なしで即公開されるため要注意）'
        required: false
        default: 'publish'
        type: choice
        options:
          - publish  # 本公開（自動で即公開・デフォルト）
          - draft    # 下書き
          - pending  # 承認待ち

concurrency:
  # 前回の実行が長引いていても、次のcronと重複起動しないようにする
  group: wordpress-blog-post
  cancel-in-progress: false

jobs:
  post-drafts:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3

      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 依存ライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: WordPressへ投稿（AV・date順・重複除外・10件になるまで検索）
        if: ${{ github.event.inputs.content_type == '' || github.event.inputs.content_type == 'both' || github.event.inputs.content_type == 'av' }}
        env:
          DMM_API_ID:        ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID:  ${{ secrets.DMM_AFFILIATE_ID }}
          WP_URL:            ${{ secrets.WP_URL }}
          WP_USERNAME:       ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
          # スケジュール実行（cron）時は github.event.inputs が空になるため、
          # その場合のデフォルトをここで指定する（現在: publish = 自動で即公開）。
          WP_POST_STATUS:    ${{ github.event.inputs.wp_post_status || 'publish' }}
          CONTENT_TYPE:      av
          PRICE_MIN:         ${{ github.event.inputs.price_min || '' }}
          PRICE_MAX:         ${{ github.event.inputs.price_max || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DMM_SORT_MODE:     ${{ github.event.inputs.dmm_sort_mode || 'date' }}
          MAX_ARTICLES:      ${{ github.event.inputs.max_articles || '10' }}
        run: python wordpress_blog_poster.py

      - name: WordPressへ投稿（同人・date順・重複除外・10件になるまで検索）
        if: ${{ github.event.inputs.content_type == '' || github.event.inputs.content_type == 'both' || github.event.inputs.content_type == 'doujin' }}
        env:
          DMM_API_ID:        ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID:  ${{ secrets.DMM_AFFILIATE_ID }}
          WP_URL:            ${{ secrets.WP_URL }}
          WP_USERNAME:       ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
          WP_POST_STATUS:    ${{ github.event.inputs.wp_post_status || 'publish' }}
          CONTENT_TYPE:      doujin
          PRICE_MIN:         ${{ github.event.inputs.price_min || '' }}
          PRICE_MAX:         ${{ github.event.inputs.price_max || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DMM_SORT_MODE:     ${{ github.event.inputs.dmm_sort_mode || 'date' }}
          MAX_ARTICLES:      ${{ github.event.inputs.max_articles || '10' }}
        run: python wordpress_blog_poster.py

      - name: 投稿履歴・除外ログをリポジトリにコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p outputs
          git add -A outputs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 WordPress自動投稿 履歴更新 ($(date +'%Y-%m-%d %H:%M:%S'))" && git push)
