name: FANZA 同人/動画 → WordPress 自動投稿（6時間おき）

on:
  schedule:
    # UTC 0:00 / 6:00 / 12:00 / 18:00（日本時間 9:00 / 15:00 / 21:00 / 3:00 頃）に実行。6時間おき・1日4回。
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      content_type:
        description: 'コンテンツ種別'
        required: false
        default: 'doujin'
        type: choice
        options:
          - doujin  # FANZA同人
          - av      # FANZA動画（AV）
      dmm_sort_mode:
        description: 'ソートモード'
        required: false
        default: 'rank'
        type: choice
        options:
          - rank   # 人気順
          - date   # 新着順
      price_min:
        description: '価格下限（円・空欄で制限なし）'
        required: false
        default: ''
        type: string
      price_max:
        description: '価格上限（円・空欄で制限なし）'
        required: false
        default: ''
        type: string
      max_articles:
        description: '1回の実行で投稿する記事数の上限'
        required: false
        default: '5'
        type: string
      wp_post_status:
        description: '投稿ステータス（publishは目視確認なしで即公開されるため要注意）'
        required: false
        default: 'publish'
        type: choice
        options:
          - publish  # 本公開（自動で即公開・デフォルト）
          - draft    # 下書き
          - pending  # 承認待ち

concurrency:
  # 前回の実行が長引いていても、次のcronと重複起動しないようにする
  group: wordpress-blog-post
  cancel-in-progress: false

jobs:
  post-drafts:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3

      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 依存ライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: WordPressへ投稿（rank上位・重複除外・件数になるまで検索）
        env:
          DMM_API_ID:        ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID:  ${{ secrets.DMM_AFFILIATE_ID }}
          WP_URL:            ${{ secrets.WP_URL }}
          WP_USERNAME:       ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
          # スケジュール実行（cron）時は github.event.inputs が空になるため、
          # その場合のデフォルトをここで指定する（現在: publish = 自動で即公開）。
          WP_POST_STATUS:    ${{ github.event.inputs.wp_post_status || 'publish' }}
          CONTENT_TYPE:      ${{ github.event.inputs.content_type || 'doujin' }}
          PRICE_MIN:         ${{ github.event.inputs.price_min || '' }}
          PRICE_MAX:         ${{ github.event.inputs.price_max || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DMM_SORT_MODE:     ${{ github.event.inputs.dmm_sort_mode || 'rank' }}
          MAX_ARTICLES:      ${{ github.event.inputs.max_articles || '5' }}
        run: python wordpress_blog_poster.py

      - name: 投稿履歴・除外ログをリポジトリにコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p outputs
          git add -A outputs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 WordPress自動投稿 履歴更新 ($(date +'%Y-%m-%d %H:%M:%S'))" && git push)
