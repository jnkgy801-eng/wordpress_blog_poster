name: FANZA 人気ランキング記事 → WordPress 自動投稿（週次）

on:
  schedule:
    # 毎週月曜 UTC 0:00（日本時間 月曜9:00頃）に実行
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      content_type:
        description: 'コンテンツ種別'
        required: false
        default: 'doujin'
        type: choice
        options:
          - doujin  # FANZA同人
          - av      # FANZA動画（AV）
      ranking_top_n:
        description: 'ランキング掲載件数'
        required: false
        default: '5'
        type: string
      wp_post_status:
        description: '投稿ステータス（publishは目視確認なしで即公開されるため要注意）'
        required: false
        default: 'draft'
        type: choice
        options:
          - draft    # 下書き（デフォルト・必ず目視確認してから公開）
          - pending  # 承認待ち
          - publish  # 本公開

concurrency:
  group: ranking-article-post
  cancel-in-progress: false

jobs:
  post-ranking-draft:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3

      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 依存ライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: ランキング記事をWordPressへ投稿
        env:
          DMM_API_ID:        ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID:  ${{ secrets.DMM_AFFILIATE_ID }}
          WP_URL:            ${{ secrets.WP_URL }}
          WP_USERNAME:       ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
          WP_POST_STATUS:    ${{ github.event.inputs.wp_post_status || 'draft' }}
          CONTENT_TYPE:      ${{ github.event.inputs.content_type || 'doujin' }}
          DMM_SORT_MODE:     rank
          RANKING_TOP_N:     ${{ github.event.inputs.ranking_top_n || '5' }}
        run: python ranking_article_poster.py

      - name: 投稿履歴をリポジトリにコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p outputs
          git add -A outputs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 ランキング記事投稿 履歴更新 ($(date +'%Y-%m-%d %H:%M:%S'))" && git push)
